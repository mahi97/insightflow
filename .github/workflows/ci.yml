name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type-check (mypy)
        run: uv run mypy src
      - name: Tests (pytest)
        run: uv run pytest
      - name: Acceptance smoke
        run: |
          uv run insightflow demo --force -C /tmp/ci_demo
          uv run insightflow validate -C /tmp/ci_demo
          uv run insightflow plan -C /tmp/ci_demo
          uv run insightflow benchmark --steps 5 --projects 1 -C /tmp/ci_demo
